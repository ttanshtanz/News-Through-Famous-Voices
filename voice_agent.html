<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Through Famous Voices</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #c8a96e;
    --accent2: #e8c84e;
    --text: #f0ead6;
    --muted: #666;
    --red: #e05555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(232,200,78,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeDown 0.8s ease both;
  }

  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 16px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 24px auto;
  }

  /* Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.2s ease both;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-card { padding: 24px; }
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 2px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(200,169,110,0.2);
  }

  select option { background: #1a1a1a; }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  /* Persona grid */
  .persona-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-top: 4px;
  }

  .persona-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 10px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    letter-spacing: 0.05em;
  }

  .persona-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .persona-btn.active {
    border-color: var(--accent);
    background: rgba(200,169,110,0.08);
    color: var(--accent);
  }

  .persona-btn .emoji { margin-right: 6px; }

  /* Custom persona input */
  .custom-persona-wrap {
    margin-top: 10px;
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(200,169,110,0.2);
  }

  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 48px;
    animation: fadeUp 0.4s ease both;
  }

  .loading.show { display: block; }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .loading-text {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .loading-persona {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    margin-top: 8px;
    font-style: italic;
  }

  /* Result */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
    position: relative;
  }

  .result-card.show { display: block; }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200%;
    animation: shimmer 2s linear infinite;
  }

  .result-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: gap;
    gap: 12px;
  }

  .result-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .result-persona-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent);
    font-style: italic;
  }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .action-btn.speaking {
    border-color: var(--accent2);
    color: var(--accent2);
    animation: pulse 1.5s infinite;
  }

  .result-body {
    padding: 32px;
  }

  .result-text {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Voice indicator */
  .voice-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    border-top: 1px solid var(--border);
    background: rgba(200,169,110,0.04);
  }

  .voice-bar.show { display: flex; }

  .voice-waves {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 20px;
  }

  .wave {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s infinite ease-in-out;
  }
  .wave:nth-child(1) { animation-delay: 0s; height: 8px; }
  .wave:nth-child(2) { animation-delay: 0.1s; height: 14px; }
  .wave:nth-child(3) { animation-delay: 0.2s; height: 20px; }
  .wave:nth-child(4) { animation-delay: 0.3s; height: 14px; }
  .wave:nth-child(5) { animation-delay: 0.4s; height: 8px; }

  .voice-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .stop-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .stop-btn:hover { background: rgba(224,85,85,0.1); }

  /* Error */
  .error-card {
    display: none;
    background: rgba(224,85,85,0.06);
    border: 1px solid rgba(224,85,85,0.3);
    border-radius: 2px;
    padding: 20px 24px;
    font-size: 12px;
    color: var(--red);
    letter-spacing: 0.05em;
    animation: fadeUp 0.4s ease both;
  }
  .error-card.show { display: block; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 60px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #333;
    text-transform: uppercase;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  @keyframes shimmer {
    0% { background-position: 200% center; }
    100% { background-position: -200% center; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
  }
</style>
</head>
<body>
<div class="noise"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="eyebrow">Agentic AI · Powered by Langflow + Gemini</div>
    <h1>News Through<br><em>Famous Voices</em></h1>
    <div class="divider"></div>
    <p>Real news. Legendary personalities. Powered by AI.</p>
  </div>

  <!-- Form -->
  <div class="form-card">
    <div class="form-row">
      <div class="field full">
        <label>News Topic</label>
        <input type="text" id="topicInput" placeholder="e.g. Elon Musk, iPhone 17, OpenAI GPT-5..." />
      </div>
    </div>

    <div class="field">
      <label>Choose a Famous Voice</label>
      <div class="persona-grid">
        <button class="persona-btn active" data-persona="Gordon Ramsay"><span class="emoji">👨‍🍳</span>Gordon Ramsay</button>
        <button class="persona-btn" data-persona="Sherlock Holmes"><span class="emoji">🔍</span>Sherlock Holmes</button>
        <button class="persona-btn" data-persona="David Attenborough"><span class="emoji">🌿</span>David Attenborough</button>
        <button class="persona-btn" data-persona="Shakespeare"><span class="emoji">🎭</span>Shakespeare</button>
        <button class="persona-btn" data-persona="Angry Reddit User"><span class="emoji">😤</span>Angry Redditor</button>
        <button class="persona-btn" data-persona="Yoda"><span class="emoji">🟢</span>Yoda</button>
        <button class="persona-btn" data-persona="a pirate captain"><span class="emoji">🏴‍☠️</span>Pirate Captain</button>
        <button class="persona-btn custom-trigger" data-persona="custom"><span class="emoji">✏️</span>Custom...</button>
      </div>
      <div class="custom-persona-wrap" id="customWrap" style="display:none">
        <input type="text" id="customPersona" placeholder="Type any person or character..." />
      </div>
    </div>

    <br/>
    <button class="submit-btn" id="submitBtn" onclick="generate()">
      ▶ &nbsp; Deliver the News
    </button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="loading-text">Searching the news & channeling</div>
    <div class="loading-persona" id="loadingPersona">Gordon Ramsay</div>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-meta">
        <div class="result-label">Delivering news as</div>
        <div class="result-persona-name" id="resultPersonaName">Gordon Ramsay</div>
      </div>
      <div class="result-actions">
        <button class="action-btn" id="speakBtn" onclick="toggleSpeak()">
          🔊 <span id="speakLabel">Speak</span>
        </button>
        <button class="action-btn" onclick="copyResult()">
          📋 Copy
        </button>
      </div>
    </div>
    <div class="result-body">
      <div class="result-text" id="resultText"></div>
    </div>
    <div class="voice-bar" id="voiceBar">
      <div class="voice-waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
      </div>
      <span class="voice-label" id="voicePersonaLabel">Gordon Ramsay is speaking...</span>
      <button class="stop-btn" onclick="stopSpeaking()">■ Stop</button>
    </div>
  </div>

  <div class="footer">
    Built with Langflow · Gemini 2.5 Flash · DuckDuckGo Search
  </div>

</div>

<script>
  const FLOW_ID = '5aa31460-f63c-4710-9f1f-1babb5db3152';
  const API_URL = `http://localhost:7860/api/v1/run/${FLOW_ID}`;

  let selectedPersona = 'Gordon Ramsay';
  let currentUtterance = null;
  let isSpeaking = false;

  // Persona selection
  document.querySelectorAll('.persona-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (btn.dataset.persona === 'custom') {
        document.getElementById('customWrap').style.display = 'block';
        document.getElementById('customPersona').focus();
        selectedPersona = '';
      } else {
        document.getElementById('customWrap').style.display = 'none';
        selectedPersona = btn.dataset.persona;
      }
    });
  });

  document.getElementById('customPersona').addEventListener('input', (e) => {
    selectedPersona = e.target.value;
  });

  // Enter key on topic
  document.getElementById('topicInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generate();
  });

  async function generate() {
    const topic = document.getElementById('topicInput').value.trim();
    const persona = selectedPersona || document.getElementById('customPersona').value.trim();

    if (!topic) {
      showError('Please enter a news topic!');
      document.getElementById('topicInput').focus();
      return;
    }
    if (!persona) {
      showError('Please choose or type a persona!');
      return;
    }

    // Stop any speaking
    stopSpeaking();

    // UI state
    hideAll();
    document.getElementById('loading').classList.add('show');
    document.getElementById('loadingPersona').textContent = persona;
    document.getElementById('submitBtn').disabled = true;

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'x-api-key': 'sk-G0YnIJuVyzyVvNJkX57O2X-lPBnJSKoYDX81aHmRJ3s'
        },
        body: JSON.stringify({
          output_type: 'chat',
          input_type: 'chat',
          input_value: topic,
          tweaks: {
            "TextInput-vD0sO": { input_value: persona }
          }
        })
      });

      if (!response.ok) throw new Error(`Server error: ${response.status}`);

      const data = await response.json();

      // Extract text from Langflow response
      let resultText = '';
      try {
        resultText = data.outputs[0].outputs[0].results.message.text;
      } catch {
        try {
          resultText = data.outputs[0].outputs[0].messages[0].message;
        } catch {
          resultText = JSON.stringify(data, null, 2);
        }
      }

      showResult(resultText, persona);

    } catch (err) {
      console.error(err);
      showError(`Could not connect to Langflow. Make sure it's running on localhost:7860.\n\nError: ${err.message}`);
    } finally {
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('loading').classList.remove('show');
    }
  }

  function showResult(text, persona) {
    document.getElementById('resultText').textContent = text;
    document.getElementById('resultPersonaName').textContent = persona;
    document.getElementById('voicePersonaLabel').textContent = `${persona} is speaking...`;
    document.getElementById('resultCard').classList.add('show');
  }

  function hideAll() {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('errorCard').classList.remove('show');
    document.getElementById('voiceBar').classList.remove('show');
  }

  function showError(msg) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('errorCard').textContent = msg;
    document.getElementById('errorCard').classList.add('show');
    document.getElementById('submitBtn').disabled = false;
  }

  // Text to Speech
  function toggleSpeak() {
    if (isSpeaking) {
      stopSpeaking();
    } else {
      startSpeaking();
    }
  }

  function startSpeaking() {
    const text = document.getElementById('resultText').textContent;
    if (!text || !window.speechSynthesis) return;

    stopSpeaking();

    currentUtterance = new SpeechSynthesisUtterance(text);

    // Pick voice based on persona
    const persona = document.getElementById('resultPersonaName').textContent.toLowerCase();
    const voices = window.speechSynthesis.getVoices();

    const getVoice = (name) => voices.find(v => v.name === name);

    let selectedVoice = null;
    let rate = 0.95;
    let pitch = 1.0;

    if (persona.includes('gordon ramsay')) {
      selectedVoice = getVoice('Microsoft George - English (United Kingdom)');
      rate = 1.1; pitch = 1.1; // fast, aggressive
    } else if (persona.includes('sherlock')) {
      selectedVoice = getVoice('Google UK English Male');
      rate = 0.9; pitch = 0.9; // slow, deductive
    } else if (persona.includes('attenborough')) {
      selectedVoice = getVoice('Microsoft George - English (United Kingdom)');
      rate = 0.8; pitch = 0.8; // deep, calm, slow
    } else if (persona.includes('shakespeare')) {
      selectedVoice = getVoice('Google UK English Male');
      rate = 0.85; pitch = 1.2; // formal, dramatic
    } else if (persona.includes('reddit') || persona.includes('redditor')) {
      selectedVoice = getVoice('Google US English');
      rate = 1.2; pitch = 1.1; // fast, agitated
    } else if (persona.includes('yoda')) {
      selectedVoice = getVoice('Microsoft Hazel - English (United Kingdom)');
      rate = 0.75; pitch = 0.8; // slow, wise, mysterious
    } else if (persona.includes('pirate')) {
      selectedVoice = getVoice('Microsoft George - English (United Kingdom)');
      rate = 0.95; pitch = 0.85; // gruff, dramatic
    } else {
      selectedVoice = getVoice('Google US English') || voices.find(v => v.lang.startsWith('en'));
      rate = 0.95; pitch = 1.0;
    }

    // Fallback if exact voice not found
    if (!selectedVoice) {
      selectedVoice = voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
    }

    if (selectedVoice) currentUtterance.voice = selectedVoice;
    currentUtterance.rate = rate;
    currentUtterance.pitch = pitch;
    currentUtterance.rate = 0.95;
    currentUtterance.pitch = 1.0;

    currentUtterance.onstart = () => {
      isSpeaking = true;
      document.getElementById('speakLabel').textContent = 'Stop';
      document.getElementById('speakBtn').classList.add('speaking');
      document.getElementById('voiceBar').classList.add('show');
    };

    currentUtterance.onend = () => {
      isSpeaking = false;
      document.getElementById('speakLabel').textContent = 'Speak';
      document.getElementById('speakBtn').classList.remove('speaking');
      document.getElementById('voiceBar').classList.remove('show');
    };

    window.speechSynthesis.speak(currentUtterance);
  }

  function stopSpeaking() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    document.getElementById('speakLabel').textContent = 'Speak';
    document.getElementById('speakBtn').classList.remove('speaking');
    document.getElementById('voiceBar').classList.remove('show');
  }

  function copyResult() {
    const text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target.closest('.action-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy', 2000);
    });
  }

  // Load voices
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
